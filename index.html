<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiq - Real Working App</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
header{display:flex;justify-content:space-between;padding:20px;background:#111827}
a{color:#ccc;margin-left:15px;cursor:pointer}
a:hover{color:#fff}
.section{display:none;padding:40px;text-align:center}
.active{display:block}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#3b82f6;color:white;cursor:pointer}
input,textarea{width:80%;padding:10px;margin:10px;border-radius:8px;border:none}
li{margin:5px 0}
</style>
</head>
<body>

<header>
<div>Studiq</div>
<div>
<a onclick="show('home')">Home</a>
<a onclick="show('timer')">Timer</a>
<a onclick="show('planner')">Planner</a>
<a onclick="show('summarizer')">Summarizer</a>
</div>
</header>

<div id="home" class="section active">
<h1>Study Smarter</h1>
<p>All tools actually working.</p>
<button onclick="show('timer')">Start</button>
<img src="https://c.statcounter.com/13212872/0/14c16a4e/1/">
</div>

<div id="timer" class="section">
<h1>Timer</h1>
<div id="time">25:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<div id="planner" class="section">
<h1>Planner</h1>
<input id="taskInput" placeholder="Task">
<button onclick="addTask()">Add</button>
<ul id="list"></ul>
</div>

<div id="summarizer" class="section">
<h1>Summarizer (Real basic)</h1>
<textarea id="text" placeholder="Paste text"></textarea>
<button onclick="summarize()">Summarize</button>
<p id="result"></p>
</div>

<script>
function show(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// TIMER (real working)
let t=1500, interval;
function startTimer(){
 clearInterval(interval);
 interval=setInterval(()=>{
  if(t<=0) return;
  t--;
  updateTime();
 },1000);
}
function pauseTimer(){clearInterval(interval)}
function resetTimer(){t=1500;updateTime();clearInterval(interval)}
function updateTime(){
 let m=Math.floor(t/60),s=t%60;
 document.getElementById('time').innerText=`${m}:${s<10?'0':''}${s}`;
}

// PLANNER (SAVES DATA)
function loadTasks(){
 let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
 let list=document.getElementById('list');
 list.innerHTML='';
 tasks.forEach((task,i)=>{
  let li=document.createElement('li');
  li.innerText=task;
  li.onclick=()=>deleteTask(i);
  list.appendChild(li);
 });
}
function addTask(){
 let input=document.getElementById('taskInput');
 let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
 tasks.push(input.value);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 input.value='';
 loadTasks();
}
function deleteTask(i){
 let tasks=JSON.parse(localStorage.getItem('tasks'));
 tasks.splice(i,1);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 loadTasks();
}
loadTasks();

// SUMMARIZER (better logic)
function summarize(){
 let text=document.getElementById('text').value;
 let sentences=text.split('.');
 document.getElementById('result').innerText=sentences.slice(0,3).join('.')+'.';
}
</script>

var sc_project=13212872; 
var sc_invisible=1; 
var sc_security="14c16a4e"; 
</script>
<script src="https://www.statcounter.com/counter/counter.js" async></script>

</body>
</html>
