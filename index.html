<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studiq - Ultimate Study Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #2c3e50;
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      margin-top: 50px;
    }
    #visitorCount {
      font-size: 24px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>Welcome to Studiq - Study Smarter!</h1>
  <p id="visitorCount">Visitors: 0</p>
  <button onclick="increaseVisitorCount()">Increase Visitor Count</button>

  <script>
    let visitorCount = 0;
    
    function increaseVisitorCount() {
      visitorCount++;
      document.getElementById("visitorCount").innerText = "Visitors: " + visitorCount;
    }
  </script>
</body>
</html>
