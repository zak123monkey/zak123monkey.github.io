<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiq</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#2c003e,#a83279,#ff6a3d);
  color:white;
}

nav {
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:rgba(0,0,0,0.4);
}

.page { display:none; padding:30px; }
.page.active { display:block; }

.box {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

input,textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button.main { margin-top:10px; padding:10px; }

.progress { height:6px; background:#333; }
.progress-bar { height:100%; width:0%; background:lime; }

/* GAME */
#gameCanvas {
  display:block;
  margin:auto;
}

#gameUI {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

#gameUI button { pointer-events:auto; }

</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<div id="home" class="page active">
<h1>Studiq</h1>
<div class="box">
<p>Streak: <span id="streak"></span></p>
<p>Tasks: <span id="taskCount"></span></p>
</div>
</div>

<div id="timer" class="page">
<div class="box">
<input id="mins">
<button onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>
</div>

<div id="tools" class="page">
<div class="box">
<input id="taskInput">
<button onclick="addTask()">Add Task</button>
<ul id="tasks"></ul>

<button onclick="openGame()">Play Game</button>
</div>
</div>

<!-- GAME -->
<div id="gameScreen" style="display:none; position:fixed; inset:0; background:black;">
<canvas id="gameCanvas" width="800" height="600"></canvas>

<div id="gameUI">
<div id="gameText">Click Start</div>
<button onclick="startGame()">Start Game</button>
</div>

<button onclick="closeGame()" style="position:absolute;top:10px;right:10px;">Exit</button>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* TIMER */
let timer;
function startTimer(){
  let m=parseInt(mins.value);
  if(!m) return;

  let total=m*60, left=total;

  clearInterval(timer);

  timer=setInterval(()=>{
    left--;
    let mm=Math.floor(left/60);
    let ss=left%60;

    time.innerText=`${mm}:${("0"+ss).slice(-2)}`;
    bar.style.width=((total-left)/total)*100+"%";

    if(left<=0) clearInterval(timer);
  },1000);
}

/* TASKS */
let tasks=[];
function renderTasks(){
  tasksEl.innerHTML="";
  tasks.forEach((t,i)=>{
    tasksEl.innerHTML+=`<li>${t}</li>`;
  });
}
function addTask(){
  if(!taskInput.value.trim()) return;
  tasks.push(taskInput.value);
  taskInput.value="";
  renderTasks();
}

/* ===== WORKING FLAPPY BIRD ===== */

let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

let bird, pipes, velocity, gravity, running, frame;

function openGame(){
  gameScreen.style.display="block";
  initGame();
}

function closeGame(){
  gameScreen.style.display="none";
  running=false;
}

/* INIT */
function initGame(){
  bird={x:100,y:250,size:20};
  pipes=[];
  velocity=0;
  gravity=0.5;
  running=false;
  frame=0;

  draw(); // draw instantly
}

/* START */
function startGame(){
  running=true;
  gameUI.style.display="none";
  loop();
}

/* LOOP */
function loop(){
  if(!running) return;

  update();
  draw();

  requestAnimationFrame(loop);
}

/* UPDATE */
function update(){
  frame++;

  velocity+=gravity;
  bird.y+=velocity;

  if(frame % 90 === 0){
    let gap=150;
    let top=Math.random()*300+50;

    pipes.push({
      x:800,
      top:top,
      bottom:top+gap
    });
  }

  pipes.forEach(p=>{
    p.x-=3;

    if(
      bird.x < p.x+50 &&
      bird.x+20 > p.x &&
      (bird.y < p.top || bird.y+20 > p.bottom)
    ){
      running=false;
      gameUI.style.display="flex";
      gameText.innerText="Game Over";
    }
  });

  if(bird.y>600 || bird.y<0){
    running=false;
    gameUI.style.display="flex";
    gameText.innerText="Game Over";
  }
}

/* DRAW */
function draw(){
  ctx.fillStyle="#70c5ce";
  ctx.fillRect(0,0,800,600);

  ctx.fillStyle="yellow";
  ctx.fillRect(bird.x,bird.y,20,20);

  ctx.fillStyle="green";
  pipes.forEach(p=>{
    ctx.fillRect(p.x,0,50,p.top);
    ctx.fillRect(p.x,p.bottom,50,600);
  });
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
  if(e.code==="Space" && running){
    velocity=-8;
  }
});

canvas.addEventListener("click",()=>{
  if(running){
    velocity=-8;
  }
});

</script>

</body>
</html>
