<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiq</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #2c003e, #5a0f4d, #a83279, #ff6a3d);
  color: white;
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Pages */
.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.page.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* Cards */
.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  margin-top: 20px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

textarea, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

/* Buttons */
button {
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

button:active {
  transform: scale(0.96);
}

button.main {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}

#time {
  font-size: 48px;
  text-align: center;
  margin-top: 15px;
}

/* Progress */
.progress {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.3s linear;
}

#gameCanvas {
  background: black;
  display: block;
  margin: auto;
}
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome to Studiq</h1>
<p style="text-align:center;">"to be is to do" — zak123monkey</p>

<h3>🔥 Study Streak</h3>
<p id="streak">0 days</p>

<div class="box">
<p>All-in-one study system to help you focus and improve daily.</p>
</div>

<div class="box" style="text-align:center;">
<h3>⚠️ Found a problem?</h3>
<a href="mailto:zmal4525@gmail.com">📩 Email Support</a>
</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="box">
<h2>⏱ Study Timer</h2>
<input id="mins" placeholder="Enter minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>
</div>

<!-- SUMMARIZER -->
<div id="notes" class="page">
<div class="box">
<h2>🧠 Smart Summarizer</h2>
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<button class="main" onclick="copySummary()">Copy</button>
<p id="result"></p>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="box">
<h2>📅 Planner</h2>
<textarea id="plan"></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<p id="planOut"></p>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="box">

<h3>💬 Motivation</h3>
<button class="main" onclick="quote()">Get Quote</button>
<p id="quote"></p>

<h3>📝 Tasks</h3>
<input id="taskInput">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>

<h3>🎯 Goal</h3>
<input id="goalInput">
<button class="main" onclick="setGoal()">Save</button>
<p id="goal"></p>

<h3>🎮 Game</h3>
<button class="main" onclick="openGame()">Play</button>

</div>
</div>

<!-- GAME -->
<div id="gameScreen" style="display:none; position:fixed; inset:0; background:black;">
<canvas id="gameCanvas" width="800" height="600"></canvas>
<button onclick="closeGame()" style="position:absolute;top:10px;right:10px;">Exit</button>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
}

/* TIMER */
let timer;
function startTimer(){
  let mins=parseInt(minsInput.value);
  if(!mins || mins<=0) return alert("Enter valid minutes");

  let total=mins*60;
  let left=total;

  clearInterval(timer);

  timer=setInterval(()=>{
    left--;

    let m=Math.floor(left/60);
    let s=left%60;

    time.innerText=`${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
    bar.style.width=((total-left)/total)*100+"%";

    if(left<=0){
      clearInterval(timer);
      new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
    }
  },1000);
}

/* SUMMARIZER */
function summarize(){
  let t=text.value.trim();
  if(!t) return result.innerText="Enter text.";

  result.innerText=t.split(". ").slice(0,3).join(". ");
}

function copySummary(){
  navigator.clipboard.writeText(result.innerText);
}

/* PLANNER */
function makePlan(){
  let arr=plan.value.split(",");
  let out="";
  arr.forEach((s,i)=>{
    if(s.trim()) out+=`Day ${i+1}: ${s}<br>`;
  });
  planOut.innerHTML=out||"Enter subjects.";
}

/* TASKS */
let tasks=JSON.parse(localStorage.tasks||"[]");

function renderTasks(){
  tasksEl.innerHTML="";
  tasks.forEach((t,i)=>{
    tasksEl.innerHTML+=`<li>${t} <button onclick="delTask(${i})">❌</button></li>`;
  });
}

function addTask(){
  if(!taskInput.value.trim()) return;
  tasks.push(taskInput.value);
  localStorage.tasks=JSON.stringify(tasks);
  taskInput.value="";
  renderTasks();
}

function delTask(i){
  tasks.splice(i,1);
  localStorage.tasks=JSON.stringify(tasks);
  renderTasks();
}

taskInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});

renderTasks();

/* GOAL */
goal.innerText=localStorage.goal||"";

function setGoal(){
  localStorage.goal=goalInput.value;
  goal.innerText=goalInput.value;
}

/* STREAK */
let today=new Date().toDateString();
let last=localStorage.last;

if(last!==today){
  let s=parseInt(localStorage.streak||"0");
  let y=new Date(); y.setDate(y.getDate()-1);

  s=(last===y.toDateString())?s+1:1;

  localStorage.streak=s;
  localStorage.last=today;
}

streak.innerText=(localStorage.streak||0)+" days";

/* QUOTE */
function quote(){
  let q=["Stay focused","Keep going","Discipline wins","You got this"];
  quoteEl.innerText=q[Math.floor(Math.random()*q.length)];
}

/* GAME */
let game=false, x=50,y=50;

function openGame(){
  gameScreen.style.display="block";
  game=true;
  draw();
}

function closeGame(){
  gameScreen.style.display="none";
  game=false;
}

function draw(){
  let ctx=gameCanvas.getContext("2d");
  ctx.clearRect(0,0,800,600);
  ctx.fillStyle="lime";
  ctx.fillRect(x,y,20,20);
}

document.addEventListener("keydown",e=>{
  if(!game) return;
  if(e.key==="ArrowUp") y-=10;
  if(e.key==="ArrowDown") y+=10;
  if(e.key==="ArrowLeft") x-=10;
  if(e.key==="ArrowRight") x+=10;
  draw();
});

</script>

</body>
</html>
