<!DOCTYPE html>
<html>
<head>

<title>Studiq - Ultimate Study Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#020617);
  color: white;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  position: sticky;
  top: 0;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

nav button:hover {
  color: #60a5fa;
}

.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}
.active { display: block; }

.box {
  background: rgba(255,255,255,0.07);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button.main {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button.main:hover {
  background: #2563eb;
}
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Studiq</h1>
<p>Study smarter. Stay focused.</p>

<div class="box">

<h3>👥 Visitors:</h3>

<img src="https://api.visitorbadge.io/api/visitors?path=studiq&label=Visitors&countColor=%233b82f6" />

<p style="margin-top:15px; opacity:0.7;">
Helping students stay focused worldwide 🌍
</p>

</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="box">
<h2>Study Timer</h2>
<input id="mins" placeholder="Minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
</div>
</div>

<!-- NOTES -->
<div id="notes" class="page">
<div class="box">
<h2>Summarizer</h2>
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<div id="result"></div>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="box">
<h2>Planner</h2>
<textarea id="plan"></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<div id="planOut"></div>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="box">

<h3>Motivation</h3>
<button onclick="quote()">Get Quote</button>
<p id="quote"></p>

<h3>Tasks</h3>
<input id="taskInput">
<button onclick="addTask()">Add</button>
<ul id="tasks"></ul>

<h3>Goal</h3>
<input id="goalInput">
<button onclick="setGoal()">Save</button>
<p id="goal"></p>

</div>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* TIMER */
let t,int;
function startTimer(){
  let m=document.getElementById("mins").value;
  t=m*60;
  clearInterval(int);
  int=setInterval(()=>{
    let min=Math.floor(t/60);
    let sec=t%60;
    document.getElementById("time").innerText=min+":"+(sec<10?"0":"")+sec;
    t--;
  },1000);
}

/* SUMMARIZER */
function summarize(){
  let text=document.getElementById("text").value;
  let s=text.split(".");
  document.getElementById("result").innerHTML=s.slice(0,3).join(".");
}

/* PLANNER */
function makePlan(){
  let t=document.getElementById("plan").value.split(",");
  let out="";
  t.forEach((d,i)=> out+="Day "+(i+1)+": "+d+"<br>");
  document.getElementById("planOut").innerHTML=out;
}

/* QUOTES */
let quotes=["Stay focused","Keep going","Discipline wins","Consistency matters"];
function quote(){
  document.getElementById("quote").innerText=
  quotes[Math.floor(Math.random()*quotes.length)];
}

/* TASKS */
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
function render(){
  let list=document.getElementById("tasks");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    list.innerHTML+=`<li>${t} <button onclick="del(${i})">X</button></li>`;
  });
}
function addTask(){
  let t=document.getElementById("taskInput").value;
  tasks.push(t);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
function del(i){
  tasks.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
render();

/* GOAL */
function setGoal(){
  let g=document.getElementById("goalInput").value;
  localStorage.setItem("goal",g);
  document.getElementById("goal").innerText=g;
}

</script>

</script>

</body>
</html>
