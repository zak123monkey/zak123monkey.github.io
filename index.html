<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiq</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #2c003e, #5a0f4d, #a83279, #ff6a3d);
  color: white;
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

nav button:hover {
  color: #60a5fa;
  transform: scale(1.05);
}

.page { display: none; padding: 40px; max-width: 1000px; margin: auto; }
.active { display: block; }

.box {
  background: rgba(255,255,255,0.07);
  padding: 25px;
  border-radius: 20px;
  margin-top: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px);
}

textarea, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

button.main {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

button.main:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#time { font-size: 48px; text-align: center; margin-top: 15px; }

.progress { height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 10px; overflow:hidden }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#22c55e,#4ade80); }

.task-done { text-decoration: line-through; opacity: 0.6; }

#gameCanvas { background: black; display: block; margin: auto; border-radius:10px }

h1,h2,h3{font-weight:600}

</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<div id="home" class="page active">
<h1>Welcome to Studiq</h1>
<p style="text-align:center; opacity:0.7;">
"to be is to do" — zak123monkey
</p>

<div class="box">
<p>All-in-one study system to help you focus, organize, and improve daily.</p>
</div>
</div>

<div id="timer" class="page">
<div class="box">
<h2>⏱ Study Timer</h2>
<input id="mins" placeholder="Enter minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
</div>
</div>

<div id="notes" class="page">
<div class="box">
<h2>🧠 Smart Summarizer</h2>
<textarea id="text" placeholder="Paste notes..."></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<div id="result"></div>
</div>
</div>

<div id="planner" class="page">
<div class="box">
<h2>📅 Planner</h2>
<textarea id="plan" placeholder="Math, Science..."></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<div id="planOut"></div>
</div>
</div>

<div id="tools" class="page">
<div class="box">
<h3>💬 Motivation</h3>
<button class="main" onclick="quote()">Get Quote</button>
<p id="quote"></p>

<h3>📝 Tasks</h3>
<input id="taskInput" placeholder="Add task">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>

<h3>🎯 Goal</h3>
<input id="goalInput" placeholder="Goal">
<button class="main" onclick="setGoal()">Save</button>
<p id="goal"></p>

<h3>🎮 Game</h3>
<button class="main" onclick="openGame()">Play</button>
</div>
</div>

<div id="gameScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
<canvas id="gameCanvas" width="800" height="600"></canvas>
<button onclick="closeGame()" style="position:absolute;top:10px;right:10px;">Exit</button>
</div>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

let t,int,total;
function startTimer(){
  let m=document.getElementById("mins").value;
  t=m*60; total=t;
  clearInterval(int);
  int=setInterval(()=>{
    let min=Math.floor(t/60);
    let sec=t%60;
    time.innerText=min+":"+(sec<10?"0":"")+sec;
    bar.style.width=((total-t)/total)*100+"%";
    t--;
  },1000);
}

function summarize(){
  let text=document.getElementById("text").value;
  let sentences=text.split(".");
  let summary=sentences.slice(0,3).join(".");
  document.getElementById("result").innerHTML="<b>Summary:</b><br>"+summary;
}

function makePlan(){
  let t=document.getElementById("plan").value.split(",");
  let out="";
  t.forEach((d,i)=>{out+="Day "+(i+1)+": "+d+"<br>";});
  document.getElementById("planOut").innerHTML=out;
}

let quotes=[
"Stay focused and never give up",
"Small progress is still progress",
"Discipline beats motivation",
"Consistency creates success"
];

function quote(){
  document.getElementById("quote").innerText=
  quotes[Math.floor(Math.random()*quotes.length)];
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
function render(){
  let list=document.getElementById("tasks");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    let li=document.createElement("li");
    li.innerHTML=t+" <button onclick='del("+i+")'>X</button>";
    list.appendChild(li);
  });
}
function addTask(){
  let t=document.getElementById("taskInput").value;
  tasks.push(t);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
function del(i){
  tasks.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
}
render();

function setGoal(){
  let g=document.getElementById("goalInput").value;
  localStorage.setItem("goal",g);
  document.getElementById("goal").innerText=g;
}

let canvas,ctx,player,enemy,coins,run;
function openGame(){
  document.getElementById("gameScreen").style.display="block";
  canvas=document.getElementById("gameCanvas");
  ctx=canvas.getContext("2d");
  player={x:100,y:100}; enemy={x:400,y:300}; coins=[];
  for(let i=0;i<10;i++) coins.push({x:Math.random()*780,y:Math.random()*580});
  run=true; loop();
}
function closeGame(){run=false; document.getElementById("gameScreen").style.display="none";}
function loop(){
  if(!run) return;
  ctx.clearRect(0,0,800,600);
  ctx.fillStyle="cyan"; ctx.fillRect(player.x,player.y,20,20);
  ctx.fillStyle="red"; enemy.x+=(player.x-enemy.x)*0.02; enemy.y+=(player.y-enemy.y)*0.02; ctx.fillRect(enemy.x,enemy.y,25,25);
  ctx.fillStyle="yellow"; coins.forEach(c=>ctx.fillRect(c.x,c.y,10,10));
  requestAnimationFrame(loop);
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp") player.y-=10;
  if(e.key==="ArrowDown") player.y+=10;
  if(e.key==="ArrowLeft") player.x-=10;
  if(e.key==="ArrowRight") player.x+=10;
});
</script>

</body>
</html>
