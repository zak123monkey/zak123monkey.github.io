<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studify</title>

<!-- ✅ ADSENSE ADDED -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9231150738350990"
crossorigin="anonymous"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#2c003e,#ff6a3d);
  color: white;
}

nav {
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:rgba(0,0,0,0.4);
}

nav button {
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.page { display:none; padding:40px; }
.active { display:block; }

.box {
  background:rgba(255,255,255,0.1);
  padding:20px;
  margin-top:20px;
  border-radius:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button.main {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<div id="home" class="page active">
<h1>Studify</h1>

<div class="box">
🔥 Streak: <span id="streak"></span><br>
⏳ Sessions: <span id="sessions"></span>
</div>

<div class="box">
<h3>Privacy Policy</h3>
<p>This site may use cookies and third-party services.</p>
</div>
</div>

<div id="timer" class="page">
<div class="box">
<input id="mins" placeholder="Minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
</div>
</div>

<div id="notes" class="page">
<div class="box">
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<p id="result"></p>
</div>
</div>

<div id="planner" class="page">
<div class="box">
<textarea id="plan"></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<p id="planOut"></p>
</div>
</div>

<div id="tools" class="page">
<div class="box">

<h3>💬 Quote</h3>
<button class="main" onclick="quote()">Get</button>
<p id="quote"></p>

<h3>📝 Tasks</h3>
<input id="taskInput">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>

<h3>🎯 Goal</h3>
<input id="goalInput">
<button class="main" onclick="setGoal()">Save</button>
<p id="goal"></p>

<h3>📚 Flashcards</h3>
<input id="q" placeholder="Question">
<input id="a" placeholder="Answer">
<button class="main" onclick="addCard()">Add</button>
<div id="cards"></div>

</div>
</div>

<script>

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

let timer;
function startTimer(){
  let m=parseInt(mins.value);
  if(!m) return;

  let t=m*60,l=t;
  clearInterval(timer);

  timer=setInterval(()=>{
    l--;
    time.innerText=Math.floor(l/60)+":"+("0"+l%60).slice(-2);

    if(l<=0){
      clearInterval(timer);
      let s=parseInt(localStorage.sessions||0)+1;
      localStorage.sessions=s;
      updateSessions();
    }
  },1000);
}

function updateSessions(){
  sessions.innerText=localStorage.sessions||0;
}
updateSessions();

function summarize(){
  let t=text.value.trim();
  result.innerText=t?t.split(". ").slice(0,3).join(". "):"";
}

function makePlan(){
  let arr=plan.value.split(",");
  planOut.innerHTML=arr.map((s,i)=>"Day "+(i+1)+": "+s).join("<br>");
}

let tasks=JSON.parse(localStorage.tasks||"[]");
let tasksEl=document.getElementById("tasks");

function renderTasks(){
  tasksEl.innerHTML="";
  tasks.forEach((t,i)=>{
    tasksEl.innerHTML+=`<li>${t} <button onclick="delTask(${i})">❌</button></li>`;
  });
}

function addTask(){
  if(!taskInput.value) return;
  tasks.push(taskInput.value);
  localStorage.tasks=JSON.stringify(tasks);
  taskInput.value="";
  renderTasks();
}

function delTask(i){
  tasks.splice(i,1);
  localStorage.tasks=JSON.stringify(tasks);
  renderTasks();
}

document.addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});

renderTasks();

goal.innerText=localStorage.goal||"";
function setGoal(){
  localStorage.goal=goalInput.value;
  goal.innerText=goalInput.value;
}

let today=new Date().toDateString();
let last=localStorage.last;

if(last!==today){
  let s=parseInt(localStorage.streak||0);
  let y=new Date(); y.setDate(y.getDate()-1);
  s=(last===y.toDateString())?s+1:1;
  localStorage.streak=s;
  localStorage.last=today;
}
streak.innerText=localStorage.streak||0;

function quote(){
  let q=["Stay focused","Keep going","Discipline wins","You got this"];
  document.getElementById("quote").innerText=q[Math.floor(Math.random()*q.length)];
}

let cards=JSON.parse(localStorage.cards||"[]");
let cardsDiv=document.getElementById("cards");

function renderCards(){
  cardsDiv.innerHTML="";
  cards.forEach((c,i)=>{
    cardsDiv.innerHTML+=`<div onclick="flip(${i})">${c.q}</div>`;
  });
}

function addCard(){
  if(!q.value||!a.value) return;
  cards.push({q:q.value,a:a.value,show:false});
  localStorage.cards=JSON.stringify(cards);
  q.value=""; a.value="";
  renderCards();
}

function flip(i){
  let el=cardsDiv.children[i];
  cards[i].show=!cards[i].show;
  el.innerText=cards[i].show?cards[i].a:cards[i].q;
}

renderCards();

</script>

</body>
</html>
